[rust]
identifiers = ["Cargo.toml"]
targets = ["target"]

[node]
identifiers = ["package.json"]
targets = ["node_modules", "dist", ".next", ".nuxt", "out", "build", ".cache", ".turbo", ".svelte-kit"]

[python]
identifiers = ["pyproject.toml", "requirements.txt", "setup.py"]
targets = ["__pycache__", "dist", "venv", ".venv", ".mypy_cache", ".pytest_cache", ".ruff_cache", "htmlcov", ".eggs"]

[java]
identifiers = ["pom.xml", "build.gradle", "build.gradle.kts"]
targets = ["target", "build", ".gradle", "out"]

[go]
identifiers = ["go.mod"]
targets = ["bin", "vendor"]

[C]
identifiers = ["CMakeLists.txt", "Makefile"]
targets = ["build", "cmake-build-debug", "cmake-build-release", ".cache"]

[Elixir]
identifiers = ["mix.exs"]
targets = ["_build", "deps"]

[Haskell]
identifiers = ["stack.yaml", "cabal.project"]
targets = ["dist", "dist-newstyle", ".stack-work"]

[Dotnet]
identifiers = ["*.csproj", "*.sln"]
targets = ["bin", "obj"]

[Ruby]
identifiers = ["Gemfile"]
targets = [".bundle", "vendor", "tmp"]

[PHP]
identifiers = ["composer.json"]
targets = ["vendor", "var"]
